let currentFilter = 'all';
const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('clearBtn');
searchInput.addEventListener('input', function() {
  clearBtn.style.display = this.value ? 'flex' : 'none';
  doSearch();
});
function clearSearch() { searchInput.value = ''; clearBtn.style.display = 'none'; doSearch(); searchInput.focus(); }
function setFilter(sup, btn) {
  currentFilter = sup;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  doSearch();
}
function formatDate(d) {
  if (!d) return '';
  const parts = d.split('.');
  if (parts.length === 3) return parts[0] + '.' + parts[1] + '.' + parts[2].slice(-2);
  return d;
}
function doSearch() {
  const q = searchInput.value.trim().toLowerCase();
  const sortBy = document.getElementById('sortBy').value;
  let filtered = DATA;
  if (currentFilter !== 'all') filtered = filtered.filter(a => a.s === currentFilter);
  if (q.length > 0) {
    const terms = q.split(/\s+/);
    filtered = filtered.filter(a => {
      const txt = (a.b + ' ' + a.s + ' ' + a.nr).toLowerCase();
      return terms.every(t => txt.includes(t));
    });
  }
  // Group by normalized description
  const groups = {};
  filtered.forEach(a => {
    const key = a.b.replace(/\s+/g,' ').trim().toUpperCase().substring(0,40);
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  });
  let groupList = Object.values(groups);
  // Sort groups
  if (sortBy === 'price_asc') groupList.sort((a,b) => Math.min(...a.map(x=>x.p)) - Math.min(...b.map(x=>x.p)));
  else if (sortBy === 'price_desc') groupList.sort((a,b) => Math.max(...b.map(x=>x.p)) - Math.max(...a.map(x=>x.p)));
  else if (sortBy === 'unit_asc') groupList.sort((a,b) => {
    const ua = Math.min(...a.map(x => x.u || x.p));
    const ub = Math.min(...b.map(x => x.u || x.p));
    return ua - ub;
  });
  else if (sortBy === 'unit_desc') groupList.sort((a,b) => {
    const ua = Math.max(...a.map(x => x.u || x.p));
    const ub = Math.max(...b.map(x => x.u || x.p));
    return ub - ua;
  });
  else if (sortBy === 'name') groupList.sort((a,b) => a[0].b.localeCompare(b[0].b, 'de'));
  else if (sortBy === 'date_desc') groupList.sort((a,b) => {
    const da = Math.max(...a.map(x => { const p=x.d.split('.'); return p.length===3 ? new Date(p[2],p[1]-1,p[0]).getTime() : 0; }));
    const db = Math.max(...b.map(x => { const p=x.d.split('.'); return p.length===3 ? new Date(p[2],p[1]-1,p[0]).getTime() : 0; }));
    return db - da;
  });
  render(groupList, q);
}
function render(groups, q) {
  const resultsDiv = document.getElementById('results');
  const total = groups.reduce((s,g) => s + g.length, 0);
  let html = '<div class="result-count">' + total + ' Artikel' + (q ? ' für „' + q + '"' : '') + '</div>';
  if (groups.length === 0) {
    html += '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><h3>Keine Artikel gefunden</h3><p>Versuch einen anderen Suchbegriff</p></div>';
    resultsDiv.innerHTML = html;
    return;
  }
  for (const items of groups) {
    const first = items[0];
    let title = first.b;
    if (q) {
      const terms = q.split(/\s+/);
      terms.forEach(t => {
        const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        title = title.replace(re, '<mark>$1</mark>');
      });
    }
    html += '<div class="card"><div class="card-header"><div><div class="card-title">' + title + '</div>';
    if (first.nr) html += '<div class="card-nr">Art.-Nr. ' + first.nr + '</div>';
    html += '</div></div><div class="card-suppliers">';
    const bestPrice = Math.min(...items.map(x => x.p));
    // Also find best unit price
    const bestUnit = Math.min(...items.map(x => x.u || x.p));
    for (const item of items) {
      const isBest = items.length > 1 && item.p === bestPrice;
      html += '<div class="supplier-tag s-' + item.s + (isBest ? ' best-price' : '') + '">';
      html += '<span class="sup-name">' + item.s + '</span>';
      html += '<span class="price">' + item.p.toFixed(2).replace('.', ',') + '\u00a0\u20ac</span>';
      html += '<span class="unit">/' + item.e + '</span>';
      // Show unit price if different from purchase price
      if (item.u) {
        const unitLabel = item.t === 'kg' ? '/kg' : '/Stk';
        html += '<span class="unit-price">' + item.u.toFixed(2).replace('.', ',') + '\u00a0\u20ac' + unitLabel + '</span>';
      }
      if (item.d) html += '<span class="date">' + formatDate(item.d) + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  resultsDiv.innerHTML = html;
}

  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function checkPw() {
  const pw = document.getElementById('pw-input').value;
  const h = await sha256(pw);
  if (h === HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('search').focus();
    sessionStorage.setItem('vz_auth','1');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPw();
});
if (sessionStorage.getItem('vz_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
}
</script>

  let groupList = Object.values(groups);
  switch(sortBy) {
    case 'price_asc': groupList.sort((a,b) => Math.min(...a.items.map(i=>i.p)) - Math.min(...b.items.map(i=>i.p))); break;
    case 'price_desc': groupList.sort((a,b) => Math.max(...b.items.map(i=>i.p)) - Math.max(...a.items.map(i=>i.p))); break;
    case 'name': groupList.sort((a,b) => a.name.localeCompare(b.name, 'de')); break;
    case 'date_desc': groupList.sort((a,b) => b.latestDate.localeCompare(a.latestDate)); break;
    default: groupList.sort((a,b) => b.maxScore - a.maxScore || a.name.localeCompare(b.name, 'de'));
  }
  const maxResults = 50;
  const total = groupList.length;
  groupList = groupList.slice(0, maxResults);
  if (groupList.length === 0) {
    resultsDiv.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><h3>Keine Artikel gefunden</h3><p>Versuche einen anderen Suchbegriff oder Filter</p></div>';
    return;
  }
  let html = '<div class="result-count">' + total + ' Ergebnis' + (total !== 1 ? 'se' : '') + (total > maxResults ? ' (zeige Top ' + maxResults + ')' : '') + '</div>';
  for (const group of groupList) {
    const items = group.items.sort((a,b) => a.p - b.p);
    const bestPrice = Math.min(...items.map(i => i.p));
    html += '<div class="card"><div class="card-header"><div><div class="card-title">' + highlightText(group.name, query) + '</div>';
    if (items[0].nr) html += '<div class="card-nr">Art.-Nr: ' + items[0].nr + '</div>';
    html += '</div></div><div class="card-suppliers">';
    for (const item of items) {
      const isBest = items.length > 1 && item.p === bestPrice;
      html += '<div class="supplier-tag s-' + item.s + (isBest ? ' best-price' : '') + '">';
      html += '<span class="sup-name">' + item.s + '</span>';
      html += '<span class="price">' + item.p.toFixed(2).replace('.', ',') + '\u00a0\u20ac</span>';
      html += '<span class="unit">/' + item.e + '</span>';
      if (item.d) html += '<span class="date">' + formatDate(item.d) + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  resultsDiv.innerHTML = html;
}
doSearch();
// Password protection
const HASH = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4'; // sha256 of "1414"
async function sha256(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function checkPw() {
  const pw = document.getElementById('pw-input').value;
  const h = await sha256(pw);
  if (h === HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    document.getElementById('search').focus();
    sessionStorage.setItem('vz_auth','1');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPw();
});
// Auto-login if already authenticated in this session
if (sessionStorage.getItem('vz_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
}
